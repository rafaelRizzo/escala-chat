services:
  pocketbase:
    image: alpine:latest
    container_name: pocketbase
    restart: unless-stopped
    working_dir: /pb

    command: >
      sh -c "
      apk add --no-cache wget unzip &&
      if [ ! -f /pb/pocketbase ]; then
        wget -O /tmp/pb.zip https://github.com/pocketbase/pocketbase/releases/download/v0.38.0/pocketbase_0.38.0_linux_amd64.zip &&
        unzip -o /tmp/pb.zip -d /pb &&
        chmod +x /pb/pocketbase;
      fi &&
      exec /pb/pocketbase serve --http=0.0.0.0:8082
      "

    volumes:
      - ./pb_data:/pb/pb_data
      - ./pb_bin:/pb

    networks:
      - proxy

networks:
  proxy:
    external: true