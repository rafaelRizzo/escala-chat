services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_URL_API: https://pocketbase.falevox.com.br/api
    container_name: escala-chat
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_URL_API=https://pocketbase.falevox.com.br/api
    restart: unless-stopped
    networks:
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  proxy:
    external: true
